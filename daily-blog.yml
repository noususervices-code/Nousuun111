<script src="js/main.js"></script>
<script>
  // Load blog preview from posts.json
  async function loadPreview() {
    const el = document.getElementById('blog-preview');
    try {
      const res = await fetch('blog/posts.json');
      const posts = await res.json();
      const top = posts.slice(0, 3);
      el.innerHTML = top.map((p, i) => `
        <a href="blog/${p.slug}.html" class="bcard ${i===0?'lead':''} reveal">
          <span class="bcat">${p.category}</span>
          <h3>${p.title}</h3>
          <p>${p.excerpt}</p>
          <span class="bdate">${p.dateLabel} · ${p.readTime}</span>
        </a>`).join('');
      el.querySelectorAll('.reveal').forEach(e => obs.observe(e));
    } catch(e) {
      el.innerHTML = '<p style="color:var(--muted);padding:2rem;">Blogeja ladataan...</p>';
    }
  }
  loadPreview();
</script>
